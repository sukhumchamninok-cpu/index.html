    z-index: 0;

  .bg-overlay {
    position: fixed;
    inset: 0;
    will-change: opacity;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,110,180,0.22) 0%, transparent 70%),
      linear-gradient(180deg, rgba(30,5,20,0.4) 0%, rgba(80,10,40,0.6) 100%);
    z-index: 1;
  }

  /* === SPARKLES === */
  .sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; -webkit-transform: translateZ(0); transform: translateZ(0); }

  .sp {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #ffb6d9, #ff6eb4);
    opacity: 0;
    animation: sparkle var(--d) ease-in-out infinite;
    animation-delay: var(--dl);
    width: var(--sz);
    height: var(--sz);
    left: var(--lf);
    top: var(--tp);
    box-shadow: 0 0 6px 2px rgba(255,110,180,0.5);
  }

  @keyframes sparkle {
    0%,100% { opacity:0; transform:scale(0.2) rotate(0deg); }
    50%      { opacity:1; transform:scale(1) rotate(180deg); }
  }

  /* === HEARTS === */
  .heart {
    position: absolute;
    color: rgba(255,160,200,0.65);
    font-size: var(--fs);
    opacity: 0;
    bottom: -30px;
    left: var(--lf);
    filter: drop-shadow(0 0 5px rgba(255,80,160,0.5));
    animation: floatUp var(--d) ease-in infinite;
    animation-delay: var(--dl);
    user-select: none;
  }

  @keyframes floatUp {
    0%   { opacity:0; transform:translateY(0) scale(0.5) rotate(-10deg); }
    15%  { opacity:0.9; }
    85%  { opacity:0.3; }
    100% { opacity:0; transform:translateY(-110vh) scale(1.2) rotate(15deg); }
  }

  /* === CARD === */
  .card {
    position: relative;
    z-index: 10;
    width: min(360px, 92vw);
    max-width: 480px;
    padding: clamp(24px, 6vw, 36px) clamp(18px, 5vw, 28px) clamp(28px, 7vw, 40px);
    border-radius: clamp(24px, 6vw, 32px);
    background: var(--glass);
    backdrop-filter: blur(28px) saturate(1.6) brightness(1.05);
    -webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.05);
    border: 1px solid var(--glass-border);
    box-shadow:
      0 12px 48px rgba(200,40,100,0.28),
      0 0 0 1px rgba(255,255,255,0.07) inset,
      0 2px 16px rgba(255,140,190,0.12) inset;
    text-align: center;
    animation: cardIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    margin: auto;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(40px) scale(0.9); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }



  /* === AVATAR === */
  .avatar-wrap {
    position: relative;
    width: clamp(80px, 22vw, 100px);
    height: clamp(80px, 22vw, 100px);
    margin: 0 auto 16px;
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ff6eb4, #ffebf5, #d63f84, #ff6eb4);
    animation: spin 3.5s linear infinite;
    z-index: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-inner {
    position: relative;
    z-index: 1;
    width: clamp(80px, 22vw, 100px);
    height: clamp(80px, 22vw, 100px);
    border-radius: 50%;
    border: 3px solid rgba(255,240,250,0.9);
    overflow: hidden;
    background: linear-gradient(135deg, #ffd6ee, #ff9bd0);
  }

  .avatar-inner img { width:100%; height:100%; object-fit:cover; }

  .star-badge {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6eb4, #cc3d80);
    border: 2.5px solid rgba(255,240,250,0.95);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    z-index: 2;
    box-shadow: 0 3px 10px rgba(200,40,100,0.5);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.12); box-shadow: 0 4px 14px rgba(200,40,100,0.7); }
  }

  /* === TEXT === */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 16px rgba(220,60,120,0.6), 0 0 40px rgba(255,110,180,0.3);
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    animation: cardIn 0.9s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,180,220,0.8);
    margin-bottom: 8px;
    animation: cardIn 0.9s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .bio {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 24px;
    animation: cardIn 0.9s 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  /* === DIVIDER === */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
    animation: cardIn 0.9s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, rgba(255,140,190,0.55), transparent);
  }
  .divider span { font-size: 14px; color: rgba(255,160,210,0.65); }

  /* === BUTTONS === */
  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 10px 0;
    padding: 14px 18px;
    min-height: 54px;
    border-radius: 18px;
    text-decoration: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: clamp(13px, 3.5vw, 14.5px);
    font-weight: 700;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,182,210,0.22);
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
    animation: cardIn 0.9s var(--delay,0.3s) cubic-bezier(0.34,1.56,0.64,1) both;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  /* shimmer sweep */
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg,
      transparent 30%,
      rgba(255,200,230,0.18) 50%,
      transparent 70%
    );
    background-size: 200% 100%;
    background-position: -100% 0;
    opacity: 0;
    transition: opacity 0.25s, background-position 0s;
  }

  .btn:hover,
  .btn:active {
    transform: translateY(-3px) scale(1.03);
    border-color: rgba(255,150,200,0.65);
    box-shadow:
      0 10px 28px rgba(200,40,100,0.4),
      0 0 0 1px rgba(255,120,180,0.25) inset,
      0 0 20px rgba(255,80,160,0.15);
    color: #fff;
  }
  .btn:active {
    transform: translateY(0) scale(0.98);
  }

  .btn:hover::after {
    opacity: 1;
    background-position: 200% 0;
    transition: opacity 0.25s, background-position 0.5s ease;
  }

  /* icon bounce on hover */
  .btn:hover .btn-icon {
    transform: scale(1.18) rotate(-5deg);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .btn-icon {
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* ripple effect */
  .btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,180,220,0.35);
    transform: scale(0);
    animation: rippleAnim 0.55s linear;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  .btn-icon {
    width: 34px; height: 34px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    z-index: 1;
  }

  .ic-discord { background: rgba(88,101,242,0.3); box-shadow: 0 0 10px rgba(88,101,242,0.25); }
  .ic-tiktok  { background: rgba(0,0,0,0.35); box-shadow: 0 0 10px rgba(255,255,255,0.08); }
  .ic-tiktok2 { background: rgba(255,110,180,0.25); box-shadow: 0 0 10px rgba(255,80,160,0.2); }
  .ic-youtube { background: rgba(255,0,0,0.3); box-shadow: 0 0 10px rgba(255,50,50,0.2); }
  .ic-fb      { background: rgba(24,119,242,0.3); box-shadow: 0 0 10px rgba(24,119,242,0.2); }
  .ic-donate  { background: rgba(255,140,0,0.25); box-shadow: 0 0 10px rgba(255,140,0,0.2); }

  .btn-label { flex:1; text-align:left; z-index:1; }
  .btn-arrow { font-size: 16px; color: rgba(255,170,210,0.6); transition: transform 0.2s; z-index:1; }
  .btn:hover .btn-arrow { transform: translateX(4px); color: rgba(255,200,230,0.9); }

  /* === FOOTER === */
  .footer {
    margin-top: 22px;
    font-size: 10.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,150,200,0.35);
    animation: cardIn 0.9s 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  /* =====================
     RESPONSIVE / MOBILE
     ===================== */
  
  /* Ensure background covers on iOS scroll bounce */
  html {
    height: -webkit-fill-available;
    background: #1a0a10;
  }
  
  /* Tablet / iPad layout */
  @media (min-width: 600px) {
    body {
      align-items: center;
      padding-top: 40px;
      padding-bottom: 40px;
    }
  }

  /* Small phones */
  @media (max-width: 380px) {
    .name {
      font-size: 20px;
    }
    .btn {
      padding: 12px 14px;
      font-size: 13px;
    }
    .btn-icon {
      width: 30px;
      height: 30px;
      font-size: 16px;
    }
  }

  /* Large screens / Desktop */
  @media (min-width: 1024px) {
    body {
      align-items: center;
    }
    .card {
      width: 380px;
    }
  }

  /* Reduce motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .sp, .heart { display: none; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-img"></div>
<div class="bg-overlay"></div>

<!-- Sparkles + Hearts container -->
<div class="sparkles" id="fx"></div>

<!-- Card -->
<div class="card">
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>

<script>
  const fx = document.getElementById('fx');
  const hearts = ['♡','♥','✦','✿','❀','˖°'];
  
  // Sparkles
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'sp';
    const sz = (3 + Math.random() * 5) + 'px';
    s.style.setProperty('--sz', sz);
    s.style.setProperty('--d', (1.5 + Math.random() * 3) + 's');
    s.style.setProperty('--dl', (Math.random() * 5) + 's');
    s.style.setProperty('--lf', (Math.random() * 100) + '%');
    s.style.setProperty('--tp', (Math.random() * 100) + '%');
    fx.appendChild(s);
  }
  
  // Floating hearts
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.setProperty('--fs', (10 + Math.random() * 18) + 'px');
    h.style.setProperty('--d', (5 + Math.random() * 7) + 's');
    h.style.setProperty('--dl', (Math.random() * 9) + 's');
    h.style.setProperty('--lf', (Math.random() * 100) + '%');
    fx.appendChild(h);
  }

  // Ripple effect on buttons - supports both mouse and touch
  document.querySelectorAll('.btn').forEach(btn => {
    function createRipple(x, y) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.width = r.style.height = size + 'px';
      r.style.left = (x - rect.left - size/2) + 'px';
      r.style.top  = (y - rect.top  - size/2) + 'px';
      btn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    }
    btn.addEventListener('click', function(e) {
      createRipple(e.clientX, e.clientY);
    });
    btn.addEventListener('touchstart', function(e) {
      const t = e.touches[0];
      createRipple(t.clientX, t.clientY);
    }, { passive: true });
  });
</script>
